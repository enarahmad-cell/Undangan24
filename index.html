<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan Ahmad & Septiani</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Montserrat&family=Parisienne&display=swap" rel="stylesheet">

<style>
:root {
--sage:#7d8e7b;
--cream:#f9f7f2;
--gold:#b89a5e;
--gold-light:#d4bc8e;
--dark-olive:#4a5448;
}

body{
font-family:Montserrat;
background:var(--cream);
margin:0;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f9f7f2;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:serif;
color:#b89a5e;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://lh3.googleusercontent.com/d/1RirYWGhVEVAqhgzainNE0ZngIWiRy7ji');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
text-align:center;
position:fixed;
width:100%;
z-index:1000;
transition:1s;
}

.hero.opened{transform:translateY(-100%)}

.btn{
background:var(--gold);
color:#fff;
padding:12px 30px;
border-radius:30px;
}

/* GALERI */
#lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}
#lightbox img{
max-width:90%;
max-height:90%;
}

/* SECTION */
section{
opacity:0;
transform:translateY(30px);
transition:1s;
padding:60px 20px;
}
section.show{
opacity:1;
transform:none;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading Wedding...</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="Ari.mp3">
</audio>

<!-- HERO -->
<div class="hero" id="hero">
<div>
<h1 style="font-size:50px;font-family:Parisienne;">Ahmad & Septiani</h1>
<p>Kepada:</p>
<h2 id="guest">Tamu Undangan</h2>
<br>
<button onclick="openInv()" class="btn">Buka Undangan</button>
</div>
</div>

<!-- CONTENT -->
<div id="main" style="display:none">

<section>
<h2>Assalamu’alaikum</h2>
<p>Dengan memohon rahmat Allah...</p>
</section>

<section>
<h2>Mempelai</h2>
<p>Ahmad & Septiani</p>
</section>

<section>
<h2>Acara</h2>
<p>04 Mei 2026 - 09:00 WIB</p>
</section>

<section id="galeri">
<h2>Galeri</h2>
<img src="https://lh3.googleusercontent.com/d/1SGhn8Z0EzEF48nZjDKl399c_VIao5eZP" width="100%">
</section>

<section>
<h2>RSVP</h2>

<input id="nama" placeholder="Nama" style="width:100%;padding:10px"><br><br>

<select id="status" style="width:100%;padding:10px">
<option>Hadir</option>
<option>Tidak Hadir</option>
</select>

<br><br>

<button onclick="kirim()" class="btn">Kirim</button>

</section>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="imgzoom">
</div>

<script>

// LOADER
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none"
},800)
}

// NAMA TAMU
let p=new URLSearchParams(location.search)
let n=p.get("to")
if(n){
document.getElementById("guest").innerText=
n.replace(/\b\w/g,l=>l.toUpperCase())
}

// OPEN
function openInv(){
document.getElementById("hero").classList.add("opened")
document.getElementById("main").style.display="block"
music.play()
initZoom()
initScroll()
}

// ZOOM GALERI
function initZoom(){
document.querySelectorAll("#galeri img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightbox").style.display="flex"
document.getElementById("imgzoom").src=img.src
}
})
}

// SCROLL ANIM
function initScroll(){
let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting) x.target.classList.add("show")
})
})
document.querySelectorAll("section").forEach(s=>obs.observe(s))
}

// GOOGLE SHEET
function kirim(){
let nama=document.getElementById("nama").value
let status=document.getElementById("status").value

fetch("https://script.google.com/macros/s/AKfycbyA4d73aag_0rnt4wfhGkC_fF5nG21UPOmwI4itQ7j_1GqypkldUFlG0Oekm0_ddpN4/exec",{
method:"POST",
body:JSON.stringify({nama,status})
})

alert("Berhasil dikirim")
}

</script>

</body>
</html>
